id: bar-by-category
name: Bar by Category
description: >-
  Horizontal bar chart showing row counts grouped by a category column.
  Default groups the customer table by `stage`. Replace `stage` with any
  text column to get a distribution chart.
author: OpenHive
category: chart
tags: [chart, bar, distribution, universal]

sizes:
  - { colSpan: 2, rowSpan: 2 }
  - { colSpan: 3, rowSpan: 2 }
  - { colSpan: 4, rowSpan: 2 }

setup_sql: |
  CREATE TABLE IF NOT EXISTS customer (
    team_id    TEXT NOT NULL,
    id         INTEGER PRIMARY KEY AUTOINCREMENT,
    name       TEXT,
    email      TEXT,
    stage      TEXT DEFAULT 'prospect',
    value      REAL DEFAULT 0,
    created_at TEXT DEFAULT (datetime('now'))
  )

panel:
  type: chart
  title: Count by Stage
  colSpan: 2
  rowSpan: 2
  props:
    variant: bar
  binding:
    source:
      kind: team_data
      config:
        sql: |
          SELECT
            stage      AS bucket,
            COUNT(*)   AS n
          FROM customer
          WHERE team_id = :team_id
          GROUP BY bucket
          ORDER BY n DESC
    map:
      rows: "$.rows[*]"
      group_by: bucket
      value: n
    refresh_seconds: 300
