id: stacked-composition
name: Stacked Composition
description: >-
  Breaks a numeric total into shares by a grouping column. Default sums
  `value` per `stage` on the customer table — a pipeline-mix view out of
  the box. Swap the two column names to get channel mix, segment mix, etc.
author: OpenHive
category: chart
tags: [chart, composition, mix, universal]

sizes:
  - { colSpan: 2, rowSpan: 2 }
  - { colSpan: 4, rowSpan: 2 }

setup_sql: |
  CREATE TABLE IF NOT EXISTS customer (
    team_id    TEXT NOT NULL,
    id         INTEGER PRIMARY KEY AUTOINCREMENT,
    name       TEXT,
    email      TEXT,
    stage      TEXT DEFAULT 'prospect',
    value      REAL DEFAULT 0,
    created_at TEXT DEFAULT (datetime('now'))
  )

panel:
  type: chart
  title: Value by Stage
  colSpan: 2
  rowSpan: 2
  props:
    variant: bar
  binding:
    source:
      kind: team_data
      config:
        sql: |
          SELECT
            stage                              AS bucket,
            SUM(COALESCE(value, 0))            AS total
          FROM customer
          WHERE team_id = :team_id
          GROUP BY bucket
          ORDER BY total DESC
    map:
      rows: "$.rows[*]"
      group_by: bucket
      value: total
    refresh_seconds: 300
