id: period-change
name: Period Change %
description: >-
  Week-over-week percent change in row count. Assumes the target table
  has a `created_at` column (ISO date or unix epoch). Result is rounded
  to one decimal place. Swap the table name to trend any time-series.
author: OpenHive
category: kpi
tags: [kpi, growth, wow, universal]

sizes:
  - { colSpan: 1, rowSpan: 1 }
  - { colSpan: 2, rowSpan: 1 }

setup_sql: |
  CREATE TABLE IF NOT EXISTS customer (
    team_id    TEXT NOT NULL,
    id         INTEGER PRIMARY KEY AUTOINCREMENT,
    name       TEXT,
    email      TEXT,
    stage      TEXT DEFAULT 'prospect',
    value      REAL DEFAULT 0,
    created_at TEXT DEFAULT (datetime('now'))
  )

panel:
  type: kpi
  title: Week over Week
  subtitle: "% change in volume"
  colSpan: 1
  rowSpan: 1
  props:
    hint: WoW change (count)
  binding:
    source:
      kind: team_data
      config:
        sql: |
          SELECT
            ROUND(
              (
                SUM(CASE
                      WHEN date(created_at) >= date('now','-7 days')
                      THEN 1 ELSE 0
                    END) * 100.0
                / NULLIF(
                    SUM(CASE
                          WHEN date(created_at) >= date('now','-14 days')
                           AND date(created_at) <  date('now','-7 days')
                          THEN 1 ELSE 0
                        END),
                    0
                  )
              ) - 100,
              1
            ) AS pct
          FROM customer
          WHERE team_id = :team_id
    map:
      rows: "$.rows[*]"
      value: pct
      aggregate: first
    refresh_seconds: 600
