id: sum-metric
name: Sum Metric
description: >-
  Sum of a numeric column across all rows. Default sums `value` on the
  customer table; change the SQL to aggregate any other column.
author: OpenHive
category: kpi
tags: [kpi, sum, universal]

sizes:
  - { colSpan: 1, rowSpan: 1 }
  - { colSpan: 2, rowSpan: 1 }

setup_sql: |
  CREATE TABLE IF NOT EXISTS customer (
    team_id    TEXT NOT NULL,
    id         INTEGER PRIMARY KEY AUTOINCREMENT,
    name       TEXT,
    email      TEXT,
    stage      TEXT DEFAULT 'prospect',
    value      REAL DEFAULT 0,
    created_at TEXT DEFAULT (datetime('now'))
  )

panel:
  type: kpi
  title: Sum
  subtitle: total value
  colSpan: 1
  rowSpan: 1
  props:
    hint: Total value
  binding:
    source:
      kind: team_data
      config:
        sql: "SELECT SUM(COALESCE(value, 0)) AS total FROM customer WHERE team_id = :team_id"
    map:
      rows: "$.rows[*]"
      value: total
      aggregate: first
    refresh_seconds: 300
