id: task-board
name: Task Board
description: >-
  Kanban of tasks grouped by status. The `task` table carries both
  `customer_id` and `deal_id` so the install-time router can link to
  whichever upstream table(s) already exist.
author: OpenHive
category: kanban
tags: [kanban, ops, relational]

sizes:
  - { colSpan: 2, rowSpan: 2 }
  - { colSpan: 4, rowSpan: 2 }

setup_sql: |
  CREATE TABLE IF NOT EXISTS task (
    team_id     TEXT NOT NULL,
    id          INTEGER PRIMARY KEY AUTOINCREMENT,
    title       TEXT NOT NULL,
    status      TEXT DEFAULT 'todo',
    customer_id INTEGER,
    deal_id     INTEGER,
    due_at      TEXT
  )

panel:
  type: kanban
  title: Task Board
  colSpan: 2
  rowSpan: 2
  binding:
    source:
      kind: team_data
      config:
        sql: |
          SELECT id, title, status, customer_id, deal_id
            FROM task
           WHERE team_id = :team_id
           ORDER BY id DESC
           LIMIT 200
    map:
      rows: "$.rows[*]"
      group_by: status
      title: title
      on_click: { kind: detail }
    refresh_seconds: 120
