id: baseball-roster
name: Baseball Roster
description: >-
  Team roster — players with position and jersey number. Creates a
  `player` table. Unrelated to CRM/business data.
author: OpenHive
category: table
tags: [table, baseball, sports]

sizes:
  - { colSpan: 2, rowSpan: 2 }
  - { colSpan: 4, rowSpan: 2 }

setup_sql: |
  CREATE TABLE IF NOT EXISTS player (
    team_id  TEXT NOT NULL,
    id       INTEGER PRIMARY KEY AUTOINCREMENT,
    name     TEXT NOT NULL,
    position TEXT,
    jersey   INTEGER,
    bats     TEXT,
    throws   TEXT,
    added_at TEXT DEFAULT (datetime('now'))
  )

panel:
  type: table
  title: Roster
  colSpan: 2
  rowSpan: 2
  binding:
    source:
      kind: team_data
      config:
        sql: |
          SELECT id, jersey, name, position, bats, throws
            FROM player
           WHERE team_id = :team_id
           ORDER BY jersey ASC
           LIMIT 60
    map:
      rows: "$.rows[*]"
      columns: [jersey, name, position, bats, throws]
      on_click: { kind: detail }
    refresh_seconds: 30
    actions:
      - id: add-player
        kind: create
        label: Add player
        placement: toolbar
        form:
          fields:
            - { name: jersey, label: "Jersey #", type: number, required: true, min: 0, max: 99 }
            - { name: name, label: Name, type: text, required: true }
            - { name: position, label: Position, type: select, options: [P, C, "1B", "2B", "3B", SS, LF, CF, RF, DH], default: P }
            - { name: bats, label: Bats, type: select, options: [L, R, S], default: R }
            - { name: throws, label: Throws, type: select, options: [L, R], default: R }
        target:
          kind: team_data
          config:
            sql: |
              INSERT INTO player (team_id, jersey, name, position, bats, throws)
              VALUES (:team_id, :jersey, :name, :position, :bats, :throws)
      - id: remove-player
        kind: delete
        label: Remove
        placement: row
        target:
          kind: team_data
          config:
            sql: "DELETE FROM player WHERE team_id = :team_id AND id = :id"
        confirm: true
