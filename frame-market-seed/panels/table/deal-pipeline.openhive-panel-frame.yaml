id: deal-pipeline
name: Deal Pipeline
description: >-
  Sortable table of open deals — title, amount, stage, owner. The `deal`
  table carries `customer_id` so when a `customer` table is already
  present the install-time router wires them together automatically.
author: OpenHive
category: table
tags: [table, sales, relational]

sizes:
  - { colSpan: 2, rowSpan: 2 }
  - { colSpan: 4, rowSpan: 2 }

setup_sql: |
  CREATE TABLE IF NOT EXISTS deal (
    team_id     TEXT NOT NULL,
    id          INTEGER PRIMARY KEY AUTOINCREMENT,
    title       TEXT NOT NULL,
    amount      REAL DEFAULT 0,
    stage       TEXT DEFAULT 'prospect',
    customer_id INTEGER,
    created_at  TEXT DEFAULT (datetime('now'))
  )

panel:
  type: table
  title: Open Deals
  colSpan: 2
  rowSpan: 2
  binding:
    source:
      kind: team_data
      config:
        sql: |
          SELECT id, title, amount, stage, customer_id
            FROM deal
           WHERE team_id = :team_id
           ORDER BY amount DESC
           LIMIT 100
    map:
      rows: "$.rows[*]"
      columns: [id, title, amount, stage, customer_id]
      on_click: { kind: detail }
    refresh_seconds: 120
