id: kpi-count
name: 카운트 KPI
description: 특정 테이블/리스트의 항목 수를 큰 숫자로 표시 (예 총 고객 수, 열린 거래 수).
icon: "🔢"
category: general
block:
  type: kpi
  colSpan: 1
  rowSpan: 1
  props:
    hint: ""
binding_skeleton:
  source:
    kind: team_data
    config:
      sql: "SELECT * FROM customer"
  map:
    aggregate: count
  refresh_seconds: 60
ai_prompts:
  goal: "한 테이블이나 리스트의 항목 개수를 세어 KPI 로 보여준다."
  requires: []
