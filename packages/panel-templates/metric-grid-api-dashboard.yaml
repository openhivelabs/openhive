id: metric-grid-api-dashboard
name: API 다중 지표
description: 외부 HTTP API 응답에서 여러 수치를 뽑아 한 패널의 여러 셀로.
icon: "📈"
category: integrations
block:
  type: metric_grid
  colSpan: 2
  rowSpan: 1
  props: {}
binding_skeleton:
  source:
    kind: http
    config:
      url: "https://api.example.com/metrics"
      method: GET
    auth_ref: ""
  map:
    rows: "$.[*]"
    cells:
      - label: "Total"
        aggregate: sum
        field: total
      - label: "Avg"
        aggregate: avg
        field: value
  refresh_seconds: 300
ai_prompts:
  goal: "외부 API 응답에서 다중 수치를 꺼내 grid. auth_ref 는 vault ref_id; 원시 키는 넣지 말 것. 최대 6셀."
  requires:
    - auth_ref
