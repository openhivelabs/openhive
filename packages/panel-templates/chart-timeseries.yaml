id: chart-timeseries
name: 시계열 차트
description: 일자/주차/월별로 집계해 막대 차트로. 일별 매출 · 주별 신규 고객 · 월별 활동 등.
icon: "📈"
category: analytics
block:
  type: chart
  colSpan: 2
  rowSpan: 2
  props:
    kind: bars
binding_skeleton:
  source:
    kind: team_data
    config:
      # AI 가 date 필드 기준 GROUP BY DATE(...) / strftime 등으로 버킷팅
      sql: "SELECT DATE(created_at) AS day, COUNT(*) AS count FROM customer GROUP BY day ORDER BY day DESC LIMIT 30"
  map:
    rows: "$.rows[*]"
    group_by: day
    value: count
  refresh_seconds: 300
ai_prompts:
  goal: "시간순 버킷 (일/주/월) 으로 집계. SQLite strftime 또는 DATE() 활용. x축 = 시간, y축 = 집계값."
  requires: []
