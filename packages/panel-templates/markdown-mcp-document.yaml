id: markdown-mcp-document
name: MCP 문서 렌더
description: MCP 서버가 반환하는 텍스트/마크다운 응답 (예 Notion 페이지 본문, MCP get_document)을 렌더.
icon: "📖"
category: integrations
block:
  type: markdown
  colSpan: 2
  rowSpan: 3
  props: {}
binding_skeleton:
  source:
    kind: mcp
    config:
      server: notion
      tool: read_page
      args:
        page_id: ""
  map:
    text: content
  refresh_seconds: 300
ai_prompts:
  goal: "MCP 응답의 본문 텍스트를 마크다운으로 렌더. map.text 는 응답 내 본문 필드의 경로 (예 content, body, markdown)."
  requires: []
