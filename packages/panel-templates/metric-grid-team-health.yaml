id: metric-grid-team-health
name: 팀 지표 그리드
description: 팀 DB 에서 뽑은 여러 KPI (합계·카운트 등)를 한 패널에 그리드로 묶어 표시.
icon: "📊"
category: general
block:
  type: metric_grid
  colSpan: 2
  rowSpan: 1
  props: {}
binding_skeleton:
  source:
    kind: team_data
    config:
      sql: "SELECT * FROM customer"
  map:
    rows: "$.rows[*]"
    cells:
      - label: "전체"
        aggregate: count
      - label: "액티브"
        aggregate: count
        filter: "status == 'active'"
      - label: "총 매출"
        aggregate: sum
        field: amount
  refresh_seconds: 60
ai_prompts:
  goal: "동일 테이블에서 2~4개의 집계를 한 패널로. 각 cell 은 label + aggregate + (옵션) field/filter. 최대 6개까지만."
  requires: []
