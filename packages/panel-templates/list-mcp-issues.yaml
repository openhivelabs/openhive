id: list-mcp-issues
name: MCP 이슈 리스트
description: MCP 이슈 트래커에서 가져온 이슈들을 아이콘 + 제목 + 상태 메타 포맷으로.
icon: "🪪"
category: integrations
block:
  type: list
  colSpan: 2
  rowSpan: 2
  props:
    icon_slot: priority_icon
    meta_slot: assignee_name
binding_skeleton:
  source:
    kind: mcp
    config:
      server: linear
      tool: list_issues
      args: {}
  map:
    rows: "$[*]"
    title: title
    value: state
  refresh_seconds: 180
ai_prompts:
  goal: "MCP 이슈/카드 리스트. icon_slot 은 row 내 문자열/이모지 필드, meta_slot 은 부가 텍스트 필드. value 는 우측 칩 텍스트."
  requires: []
