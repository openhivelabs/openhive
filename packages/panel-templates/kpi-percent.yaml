id: kpi-percent
name: 비율 KPI
description: 두 수치의 비율을 % 로 표시 (예 전환률, 승률, 완료율).
icon: "📊"
category: analytics
block:
  type: kpi
  colSpan: 1
  rowSpan: 1
  props:
    hint: "비율 (%)"
binding_skeleton:
  source:
    kind: team_data
    config:
      # AI 가 분자/분모 SQL 을 짜서 단일 숫자로 반환 (예: 100.0 * won / total)
      sql: "SELECT 0.0 AS percent"
  map:
    rows: "$.rows[*]"
    aggregate: first
    aggregate_field: percent
  refresh_seconds: 120
ai_prompts:
  goal: "두 값의 비율을 % 로 보여주는 KPI. SQL 에서 직접 계산해서 단일 'percent' 컬럼 반환."
  requires: []
