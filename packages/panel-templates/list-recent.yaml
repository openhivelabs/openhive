id: list-recent
name: 최근 항목 리스트
description: 특정 테이블/데이터에서 최근 N개를 세로 리스트로. 최근 가입 · 최근 거래 · 최근 업데이트 등.
icon: "🕒"
category: general
block:
  type: list
  colSpan: 2
  rowSpan: 2
  props: {}
binding_skeleton:
  source:
    kind: team_data
    config:
      sql: "SELECT * FROM customer ORDER BY id DESC LIMIT 10"
  map:
    rows: "$.rows[*]"
    title: name
    value: stage
  refresh_seconds: 60
ai_prompts:
  goal: "테이블에서 가장 최근의 N개 항목을 리스트로 보여준다. title/value 필드는 보여줄 핵심 정보로."
  requires: []
