id: kpi-change
name: 변화율 KPI
description: 기간 대비 변화율을 % 로 (예 전주 대비 매출 증감, 어제 대비 신규 가입 변화).
icon: "📉"
category: analytics
block:
  type: kpi
  colSpan: 1
  rowSpan: 1
  props:
    hint: "전기 대비 변화 (%)"
binding_skeleton:
  source:
    kind: team_data
    config:
      # AI 가 WITH 절로 현재·이전 기간 합계를 구한 뒤 (cur - prev) / prev * 100 계산
      sql: "SELECT 0.0 AS change_pct"
  map:
    rows: "$.rows[*]"
    aggregate: first
    aggregate_field: change_pct
  refresh_seconds: 300
ai_prompts:
  goal: "이번 기간 vs 이전 기간 변화율. WITH 절 + CASE WHEN 으로 분모 0 처리. 단일 'change_pct' 컬럼."
  requires: []
