id: chart-goal-line
name: 차트 + 목표선
description: 카테고리별 막대/선 차트에 목표선을 겹쳐 표시. 매출 vs 목표 등.
icon: "🎯"
category: general
block:
  type: chart
  colSpan: 2
  rowSpan: 2
  props:
    variant: bar
    goal_line: 100
binding_skeleton:
  source:
    kind: team_data
    config:
      sql: "SELECT stage as x, SUM(amount) as y FROM deals GROUP BY stage"
  map:
    rows: "$.rows[*]"
    group_by: x
    value: y
  refresh_seconds: 120
ai_prompts:
  goal: "카테고리별 수치 + 목표선. variant 는 bar|line|area 중 선택. goal_line 은 정적 숫자."
  requires: []
