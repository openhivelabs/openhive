id: kpi-with-delta
name: KPI + 증감 표시
description: 큰 수치 아래 증감량/방향 (▲ ▼) 을 함께 표시. 주간/월간 대비 등.
icon: "📉"
category: general
block:
  type: kpi
  colSpan: 1
  rowSpan: 1
  props:
    hint: "주간 대비"
    delta:
      value: 12
      direction: up
      percent: true
binding_skeleton:
  source:
    kind: team_data
    config:
      sql: "SELECT COUNT(*) as value FROM deals WHERE status = 'won'"
  map:
    rows: "$.rows[*]"
    aggregate: first
    aggregate_field: value
  refresh_seconds: 120
ai_prompts:
  goal: "KPI 에 delta { value, direction: up|down|flat, percent? } 를 붙여 변화를 보여줌. delta 값은 정적이거나 별도 계산 (현재 구현은 정적)."
  requires: []
