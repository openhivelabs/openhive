name: CRM
version: 0.1.0
description: >-
  Lightweight CRM starter. Customers table + simple pipeline + activity log. AI
  agents can CRUD via sql_exec; the dashboard renders tables.
tables:
  - name: customer
    purpose: main contact record
    typed_columns:
      - id (TEXT PRIMARY KEY)
      - name (TEXT)
      - email (TEXT)
      - phone (TEXT)
      - stage (TEXT — "lead" | "qualified" | "proposal" | "won" | "lost")
      - value (REAL)
      - owner (TEXT — agent id or human)
      - created_at (INTEGER)
      - updated_at (INTEGER)
    extension_field: data (JSON — free-form AI-managed fields)
  - name: activity
    purpose: per-customer notes + events
    typed_columns:
      - id (TEXT PRIMARY KEY)
      - customer_id (TEXT)
      - kind (TEXT — "note" | "email" | "call" | "meeting")
      - body (TEXT)
      - created_at (INTEGER)
    extension_field: data (JSON)
