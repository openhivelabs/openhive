id: notion
name: Notion
icon: "📝"
brand: notion
# Drop the official full-color logo at apps/web/public/brands/notion.{svg,png}
# and it'll be used in place of the monochrome simple-icons mark.
icon_url: /brands/notion.webp
description: Read and write Notion pages, databases, and blocks. Great for knowledge-base teams.
command: npx
args: ["-y", "@notionhq/notion-mcp-server"]
env_template:
  # Notion's MCP server expects a JSON blob of HTTP headers via this env var.
  # We compose it from the user's integration token to keep the form simple.
  OPENAPI_MCP_HEADERS: '{"Authorization":"Bearer {{token}}","Notion-Version":"2022-06-28"}'
inputs:
  - key: token
    label: Notion Integration Token
    type: secret
    placeholder: secret_xxxxxxxxxxxxxxxxxxxx
    help_text: |
      Create at https://www.notion.so/my-integrations.
      After creating, share each page/database you want the agent to access with the integration.
    required: true
