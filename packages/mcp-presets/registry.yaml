# MCP server whitelist — the curated set OpenHive supports out of the box.
#
# Each entry tells the UI "integrations" page and the AI composer:
#   - what to install (`package`)
#   - how to authenticate (`auth`)
#   - which recipes expect this server (`recipes`)
#
# Users can still install arbitrary MCP servers via the Advanced toggle, but
# they are off the happy path and are never suggested by the AI.

servers:
  - id: gmail
    label: "Gmail"
    icon: EnvelopeSimple
    category: email
    package: "@modelcontextprotocol/server-gmail"
    auth: oauth_google
    description: "Read / search / send mail through the user's Google account."
    recipes: [gmail-unread-count]

  - id: gcal
    label: "Google Calendar"
    icon: CalendarBlank
    category: calendar
    package: "@modelcontextprotocol/server-google-calendar"
    auth: oauth_google
    description: "List / create events on the user's Google Calendar."
    recipes: [gcal-this-week]

  - id: slack
    label: "Slack"
    icon: ChatCircleText
    category: messaging
    package: "@modelcontextprotocol/server-slack"
    auth: oauth_slack
    description: "Read channels, post messages, resolve users."
    recipes: [slack-recent]

  - id: notion
    label: "Notion"
    icon: Notebook
    category: docs
    package: "@modelcontextprotocol/server-notion"
    auth: oauth_notion
    description: "Query and edit Notion pages + databases."
    recipes: []

  - id: github
    label: "GitHub"
    icon: GithubLogo
    category: code
    package: "@modelcontextprotocol/server-github"
    auth: oauth_github
    description: "Repo metadata, PRs, issues, comments."
    recipes: [github-my-prs]

  - id: linear
    label: "Linear"
    icon: Kanban
    category: code
    package: "@modelcontextprotocol/server-linear"
    auth: oauth_linear
    description: "Issues / cycles / teams via Linear's API."
    recipes: []

  - id: hubspot
    label: "HubSpot"
    icon: Buildings
    category: sales
    package: "@modelcontextprotocol/server-hubspot"
    auth: oauth_hubspot
    description: "CRM — contacts, deals, companies."
    recipes: []
