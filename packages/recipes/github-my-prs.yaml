id: github-my-prs
label: "내 열린 PR"
icon: GitPullRequest
category: code
description: "GitHub MCP 로 내가 연 open PR 리스트."
requires:
  mcp_server: github
panel:
  type: table
  title: "내 열린 PR"
  colSpan: 2
  rowSpan: 2
  binding:
    source:
      kind: mcp
      config:
        server: github
        tool: list_my_pull_requests
        args:
          state: open
    map:
      rows: "$.pull_requests[*]"
      columns: [title, repository, status, updated_at]
      on_click:
        kind: open_url
        url_field: html_url
    refresh_seconds: 300
