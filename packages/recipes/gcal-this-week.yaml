id: gcal-this-week
label: "이번 주 일정"
icon: CalendarBlank
category: calendar
description: "Google Calendar MCP 에서 이번 주 일정 리스트."
requires:
  mcp_server: gcal
panel:
  type: list
  title: "이번 주 일정"
  colSpan: 2
  rowSpan: 2
  binding:
    source:
      kind: mcp
      config:
        server: gcal
        tool: list_events
        args:
          time_range: this_week
    map:
      rows: "$.events[*]"
      title: "summary"
      value: "start"
      on_click:
        kind: open_url
        url_field: htmlLink
    refresh_seconds: 600
