id: weather-city
label: "도시 날씨"
icon: CloudSun
category: weather
description: "OpenWeather API 로 특정 도시의 현재 기온(°C) KPI."
requires:
  auth_ref: openweather
panel:
  type: kpi
  title: "{{city}} 날씨"
  colSpan: 1
  rowSpan: 1
  props:
    hint: "°C"
  binding:
    source:
      kind: http
      config:
        url: "https://api.openweathermap.org/data/2.5/weather?q={{city}}&units=metric"
        method: GET
      auth_ref: openweather
    map:
      value: "$.main.temp"
      aggregate: first
    refresh_seconds: 900
params:
  - name: city
    label: "도시"
    type: text
    default: "Seoul"
    required: true
    injects:
      - path: "binding.source.config.url"
        template: "https://api.openweathermap.org/data/2.5/weather?q={{city}}&units=metric"
      - path: "title"
        template: "{{city}} 날씨"
