id: line-chart
name: Line Chart
description: >-
  Line chart of daily count with selectable 7 / 30 / 90 day window.
  Expects a `created_at` column (ISO date or unix epoch). Swap the
  table to plot any other time-series.
author: OpenHive
category: chart
tags: [chart, line, time-series, universal]

setup_sql: |
  CREATE TABLE IF NOT EXISTS customer (
    team_id    TEXT NOT NULL,
    id         INTEGER PRIMARY KEY AUTOINCREMENT,
    name       TEXT,
    email      TEXT,
    stage      TEXT DEFAULT 'prospect',
    value      REAL DEFAULT 0,
    created_at TEXT DEFAULT (datetime('now'))
  )

panel:
  type: chart
  title: Daily Volume
  colSpan: 2
  rowSpan: 2
  props:
    variant: line
    time_ranges: [7, 30, 90]
    default_range: 30
  binding:
    source:
      kind: team_data
      config:
        sql: |
          SELECT
            date(created_at) AS day,
            COUNT(*)        AS n
          FROM customer
          WHERE team_id = :team_id
            AND date(created_at) >= date('now','-89 days')
          GROUP BY day
          ORDER BY day ASC
    map:
      rows: "$.rows[*]"
      group_by: day
      value: n
    refresh_seconds: 600
