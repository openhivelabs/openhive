id: bar-chart
name: Bar Chart
description: >-
  Horizontal bars grouped by a category column. Default groups the
  customer table by `stage`. Swap to any text column for category breakdowns.
author: OpenHive
category: chart
tags: [chart, bar, distribution, category, universal]

setup_sql: |
  CREATE TABLE IF NOT EXISTS customer (
    team_id    TEXT NOT NULL,
    id         INTEGER PRIMARY KEY AUTOINCREMENT,
    name       TEXT,
    email      TEXT,
    stage      TEXT DEFAULT 'prospect',
    value      REAL DEFAULT 0,
    created_at TEXT DEFAULT (datetime('now'))
  )

panel:
  type: chart
  title: By Category
  colSpan: 2
  rowSpan: 2
  props:
    variant: bar
    layout: horizontal
  binding:
    source:
      kind: team_data
      config:
        sql: |
          SELECT stage AS category, COUNT(*) AS n
          FROM customer
          WHERE team_id = :team_id
          GROUP BY stage
          ORDER BY n DESC
    map:
      rows: "$.rows[*]"
      group_by: category
      value: n
    refresh_seconds: 600
