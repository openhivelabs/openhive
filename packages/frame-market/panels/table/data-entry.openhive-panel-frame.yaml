id: data-entry
name: Data Entry Form
description: >-
  Form for inserting rows into a team_data table. Tell the AI which table
  to bind to ("task 테이블에 새 작업 입력하는 폼") on install — it reads the
  schema, generates a field per writable column, marks NOT NULL fields
  with a red `*`. Submit goes through the validated INSERT path. For
  external (Supabase / MCP) tables, install with team_data first then
  edit the action SQL via the Code editor (auto-generation for external
  writes isn't supported yet — INSERT-via-MCP needs different escaping).
author: OpenHive
category: table
tags: [form, input, entry, create, insert]

panel:
  type: form
  title: Add Row
  colSpan: 2
  rowSpan: 3
  binding:
    # Form panels are write-only — the dummy static source keeps them on
    # the BoundPanel path so the actions plumbing wires up, without ever
    # fetching anything (refresh_seconds: 0 = manual only). The AI binder
    # rewrites `actions` at install time based on the user's intent.
    source:
      kind: static
      config: { value: null }
    map: {}
    refresh_seconds: 0
    actions: []
