id: kanban-board
name: Kanban Board
description: >-
  Cards organized into columns by a status / stage column. Use for task
  boards (todo / doing / done), pipelines (lead / qualified / won), or
  any flow-style data. Tell the AI which table + which column to group by
  on install.
author: OpenHive
category: kanban
tags: [kanban, board, status, pipeline, flow, cards]

setup_sql: |
  CREATE TABLE IF NOT EXISTS task (
    team_id    TEXT NOT NULL,
    id         INTEGER PRIMARY KEY AUTOINCREMENT,
    title      TEXT,
    status     TEXT NOT NULL DEFAULT 'todo' CHECK (status IN ('todo','doing','done')),
    priority   TEXT DEFAULT 'normal',
    sort_order REAL DEFAULT 0,
    created_at TEXT DEFAULT (datetime('now'))
  )

panel:
  type: kanban
  title: Board
  colSpan: 4
  rowSpan: 3
  binding:
    source:
      kind: team_data
      config:
        sql: |
          SELECT id, title, status, priority, sort_order, created_at
          FROM task
          WHERE team_id = :team_id
          ORDER BY status, sort_order
    map:
      rows: "$.rows[*]"
      group_by: status
      title: title
      on_click: { kind: detail }
    refresh_seconds: 600
    actions:
      - id: create
        kind: create
        label: Add
        target:
          kind: team_data
          config:
            sql: |
              INSERT INTO task (title, status, priority, team_id)
              VALUES (:title, :status, :priority, :team_id)
        form:
          fields:
            - { name: title,    label: Title,    type: text,   required: true }
            - { name: status,   label: Status,   type: select, options: [todo, doing, done], default: todo, required: true }
            - { name: priority, label: Priority, type: select, options: [low, normal, high], default: normal }
      - id: move
        kind: update
        label: Move
        placement: drag
        fields: [status, sort_order]
        target:
          kind: team_data
          config:
            sql: |
              UPDATE task SET status = :status, sort_order = :sort_order
              WHERE id = :id AND team_id = :team_id
        form:
          fields:
            - { name: status, label: Status, type: select, options: [todo, doing, done] }
      - id: delete
        kind: delete
        label: Delete
        target:
          kind: team_data
          config:
            sql: |
              DELETE FROM task WHERE id = :id AND team_id = :team_id
