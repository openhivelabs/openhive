id: kanban-board
name: Kanban Board
description: >-
  Cards organized into columns by a status / stage column. Use for task
  boards (todo / doing / done), pipelines (lead / qualified / won), or
  any flow-style data. Tell the AI which table + which column to group by
  on install.
author: OpenHive
category: kanban
tags: [kanban, board, status, pipeline, flow, cards]

setup_sql: |
  CREATE TABLE IF NOT EXISTS task (
    team_id    TEXT NOT NULL,
    id         INTEGER PRIMARY KEY AUTOINCREMENT,
    title      TEXT,
    status     TEXT DEFAULT 'todo',
    priority   TEXT DEFAULT 'normal',
    created_at TEXT DEFAULT (datetime('now'))
  )

panel:
  type: kanban
  title: Board
  colSpan: 4
  rowSpan: 3
  binding:
    source:
      kind: team_data
      config:
        sql: |
          SELECT id, title, status, priority, created_at
          FROM task
          WHERE team_id = :team_id
          ORDER BY created_at DESC
    map:
      rows: "$.rows[*]"
      group_by: status
      title: title
      on_click: { kind: detail }
    refresh_seconds: 600
